<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Stream Gage Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    pre { background: #f4f4f4; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>Stream Gage Dashboard</h1>
  <p id="updated">Updated: loading...</p>

  <table id="gage-table" style="width:100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
      <tr>
        <th>Site</th>
        <th>Code</th>
        <th>Value (ft)</th>
        <th>Minor Flood</th>
        <th>Major Flood</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>


<script>
// Determine island from SiteName
function getIsland(name) {
  name = name.toLowerCase();
  if (name.includes("molokai")) return "Molokai";
  if (name.includes("maui")) return "Maui";
  if (name.includes("hawaii")) return "Hawaii";
  if (name.includes("oahu")) return "Oahu";
  if (name.includes("kauai")) return "Kauai";
  return "Other";
}

// Convert UTC timestamp → Hawaii Standard Time (UTC-10)
function toHawaiiTime(utcString) {
  const utcDate = new Date(utcString);

  return utcDate.toLocaleString("en-US", {
    timeZone: "Pacific/Honolulu",
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

// Compute status from value + thresholds
function computeStatus(value, minor, major) {
  if (major !== null && value >= major) return "Major Flood";
  if (minor !== null && value >= minor) return "Minor Flood";
  if (minor !== null && value >= minor * 0.9) return "Near";
  if (minor === null && major === null) return "No Threshold";
  return "Normal";
}

// Map status → emoji + class
function getStatusInfo(status) {
  switch (status) {
    case "Normal":       return { icon: "🟢", cls: "" };
    case "Near":         return { icon: "🟡", cls: "" };
    case "Minor Flood":  return { icon: "🟠", cls: "" };
    case "Major Flood":  return { icon: "🔴", cls: "" };
    case "No Threshold": return { icon: "⚫", cls: "" };
    default:             return { icon: "⚫", cls: "" };
  }
}

fetch("latest.json?cache=" + Date.now())
  .then(r => r.json())
  .then(data => {
    // Find newest timestamp and convert to HST
    const newest = data.reduce((a, b) =>
      new Date(a.Timestamp) > new Date(b.Timestamp) ? a : b
    );
    console.log("RAW Timestamp:", newest.Timestamp);
    console.log("Hawaii Time:", toHawaiiTime(newest.Timestamp));
    
    document.getElementById("updated").textContent =
      "Updated (HST): " + toHawaiiTime(newest.Timestamp);

    const tbody = document.querySelector("#gage-table tbody");
    tbody.innerHTML = "";

    // Group by island
    const groups = {};
    data.forEach(site => {
      const island = getIsland(site.SiteName);
      if (!groups[island]) groups[island] = [];
      groups[island].push(site);
    });

    // Render each island group
    Object.keys(groups).forEach(island => {
      const headerRow = document.createElement("tr");
      headerRow.innerHTML = `
        <td colspan="6" style="
          background:#004578;
          color:white;
          font-weight:bold;
          font-size:18px;
        ">${island}</td>
      `;
      tbody.appendChild(headerRow);

      groups[island].forEach(site => {
        const status = computeStatus(site.Value, site.MinorFlood, site.MajorFlood);
        const statusInfo = getStatusInfo(status);

        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${site.SiteName}</td>
          <td>${site.SiteCode}</td>
          <td>${site.Value}</td>
          <td>${site.MinorFlood ?? ""}</td>
          <td>${site.MajorFlood ?? ""}</td>
          <td>${statusInfo.icon} ${status}</td>
        `;
        tbody.appendChild(row);
      });
    });
  })
  .catch(err => {
    document.getElementById("updated").textContent =
      "Error loading latest.json: " + err;
  });
</script>
</body>
</html>
