<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Stream Gage Dashboard</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    pre { background: #f4f4f4; padding: 20px; border-radius: 8px; }
    table {
      border-collapse: collapse;
    }
    table th,
    table td {
      border: 1px solid #ddd; /* light gray gridlines */
      padding: 6px 8px;
    }  
    table th {
      background: #f8f8f8; /* subtle header background */
      text-align: left;
      padding-left: 6px;
    }
  </style>
</head>
<body>
  <h1>Stream Gage Dashboard</h1>
  <p id="updated">Updated: loading...</p>
  <div style="text-align: right; margin-bottom: 8px;">
    <a href="allstations.html">View All Stations Map</a>
  </div>
  <table id="gage-table" style="width:100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
      <tr>
        <th>Station Name</th>
        <th>Station ID</th>
        <th>Gage Height (ft)</th>
        <th>3-Hr Trend</th>
        <th>24‑Hr Trend</th>
        <th>Minor Flood</th>
        <th>Major Flood</th>
        <th>Status</th>
        <th>Last Updated (HST)</th>
        <th>Map</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>


<script>
// Determine island from SiteName
function getIsland(name) {
  name = name.toLowerCase();
  if (name.includes("molokai")) return "Molokai";
  if (name.includes("maui")) return "Maui";
  if (name.includes("hawaii")) return "Hawaii";
  if (name.includes("oahu")) return "Oahu";
  if (name.includes("kauai")) return "Kauai";
  return "Other";
}

// Convert UTC timestamp → Hawaii Standard Time (UTC-10)
function toHawaiiTime(utcString) {
  const utcDate = new Date(utcString);

  return utcDate.toLocaleString("en-US", {
    timeZone: "Pacific/Honolulu",
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

// Compute gage height trend over last 3 hours
function getTrendArrow(trend) {
  switch (trend) {
    case "Rising":  return "↑";
    case "Falling": return "↓";
    case "Steady":  return "--";
    default:        return "•"; // for N/A
  }
}
  
// Generate sparkline chart
function makeSparkline(values, width = 100, height = 20) {
  if (!values || values.length === 0) return "";

  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 1;

  return values
    .map((v, i) => {
      const x = (i / (values.length - 1)) * width;
      const y = height - ((v - min) / range) * height;
      return `${x},${y}`;
    })
    .join(" ");
}
  
// Compute status from value + thresholds
function computeStatus(value, minor, major) {
  if (major !== null && value >= major) return "Major Flood";
  if (minor !== null && value >= minor) return "Minor Flood";
  if (minor !== null && value >= minor * 0.9) return "Near";
  if (minor === null && major === null) return "No Threshold";
  return "Normal";
}

// Map status → emoji + class
function getStatusInfo(status) {
  switch (status) {
    case "Normal":       return { icon: "🟢", cls: "" };
    case "Near":         return { icon: "🟡", cls: "" };
    case "Minor Flood":  return { icon: "🟠", cls: "" };
    case "Major Flood":  return { icon: "🔴", cls: "" };
    case "No Threshold": return { icon: "⚫", cls: "" };
    case "Out of Date": return { icon: "⚪", cls: "" };
    default:             return { icon: "⚫", cls: "" };
  }
}

// Load GitHub workflow timestamp
let buildTimeHST = "loading...";

fetch("buildinfo.json?cache=" + Date.now())
  .then(r => r.json())
  .then(info => {
    buildTimeHST = toHawaiiTime(info.buildTime);
    document.getElementById("updated").textContent =
      "Updated (HST): " + buildTimeHST;
  })
  .catch(err => {
    document.getElementById("updated").textContent =
      "Updated: error loading timestamp";
  });

let historyData = {};

Promise.all([
  fetch("history24.json?cache=" + Date.now()).then(r => r.json()),
  fetch("latest_with_trend.json?cache=" + Date.now()).then(r => r.json())
])
.then(([history24, data]) => {

  historyData = history24;   // store 24‑hour history

  const now = Date.now();
  const twentyFourHours = 24 * 60 * 60 * 1000;

  const tbody = document.querySelector("#gage-table tbody");
  tbody.innerHTML = "";

  // Group by island
  const groups = {};
  data.forEach(site => {
    const island = getIsland(site.SiteName);
    if (!groups[island]) groups[island] = [];
    groups[island].push(site);
  });

  // Render each island group
  Object.keys(groups).forEach(island => {
    const headerRow = document.createElement("tr");
    headerRow.innerHTML = `
      <td colspan="9" style="
        background:#004578;
        color:white;
        font-weight:bold;
        font-size:18px;
      ">${island}</td>
    `;
    tbody.appendChild(headerRow);

    groups[island].forEach(site => {
      const siteTime = new Date(site.Timestamp).getTime();
      const age = now - siteTime;

      let status;
      let displayValue = site.Value;

      if (age > twentyFourHours) {
        status = "Out of Date";
        displayValue = "n/a";
      } else {
        status = computeStatus(site.Value, site.MinorFlood, site.MajorFlood);
      }

      const statusInfo = getStatusInfo(status);

      // --- 24‑HOUR SPARKLINE DATA ---
      const historyValues = (historyData[site.SiteCode] || []).map(v => v.Value);
      const spark = makeSparkline(historyValues);

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${site.SiteName}</td>
        <td>${site.SiteCode}</td>
        <td>${displayValue}</td>
        <td style="white-space: pre;">${site.Trend}</td>
        <td>
          <svg width="100" height="20">
            <polyline fill="none" stroke="#0074d9" stroke-width="2"
              points="${spark}">
            </polyline>
          </svg>
        </td>
        <td>${site.MinorFlood ?? ""}</td>
        <td>${site.MajorFlood ?? ""}</td>
        <td>${statusInfo.icon} ${status}</td>
        <td>${toHawaiiTime(site.Timestamp)}</td>
        <td><a href="map.html?lat=${site.Latitude}&lon=${site.Longitude}&name=${encodeURIComponent(site.SiteName)}" target="_blank">View</a></td>
      `;
      tbody.appendChild(row);
    });
  });

})
.catch(err => {
  document.getElementById("updated").textContent =
    "Error loading data: " + err;
});
</script>
</body>
</html>
