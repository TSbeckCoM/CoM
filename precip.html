<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Precipitation Readings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #0f172a;      /* slate-900 */
      --panel: #111827;   /* gray-900 */
      --text: #e5e7eb;    /* gray-200 */
      --muted: #9ca3af;   /* gray-400 */
      --accent: #22d3ee;  /* cyan-400 */
      --border: #374151;  /* gray-700 */
      --header: #0b1220;
      --hover: #0d1a2b;
    }
    * { box-sizing: border-box }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      backdrop-filter: saturate(180%) blur(6px);
      background: color-mix(in oklab, var(--bg) 85%, transparent);
    }
    header h1 { margin: 0 0 .25rem 0; font-size: 1.25rem }
    header .sub { color: var(--muted); font-size: .95rem }

    main { max-width: 1100px; margin: 1rem auto; padding: 0 1rem 2rem }
    .controls {
      display: flex; gap: .5rem; flex-wrap: wrap; align-items: center; margin-bottom: .75rem;
    }
    .controls button, .controls select {
      background: var(--panel); color: var(--text);
      border: 1px solid var(--border); padding: .5rem .75rem; border-radius: .5rem; cursor: pointer;
    }
    .controls button:hover { border-color: var(--accent); color: white }
    .status { color: var(--muted); font-size: .9rem; margin-left: auto }

    .error {
      border: 1px solid #ef4444; color: white;
      background: color-mix(in oklab, #ef4444 20%, transparent);
      padding: .75rem; border-radius: .5rem; margin: .75rem 0 1rem;
    }
    .hidden { display: none }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: .5rem;
      overflow: hidden;
    }
    thead th {
      text-align: left; padding: .6rem .75rem;
      background: var(--header);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      position: sticky; top: 61px; z-index: 1;
      white-space: nowrap;
    }
    tbody td {
      padding: .6rem .75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tbody tr:hover { background: var(--hover) }
    .num { text-align: right; font-variant-numeric: tabular-nums }
    .muted { color: var(--muted) }
  </style>
</head>
<body>
  <header>
    <h1>Precipitation Readings</h1>
    <div class="sub" id="generatedInfo">Generated: —</div>
  </header>

  <main>
    <div id="error" class="error hidden" role="alert"></div>

    <div class="controls">
      <button id="refresh">Refresh</button>

      <label>
        Sort by:
        <select id="sortInterval"></select>
      </label>
      <select id="sortDir">
        <option value="desc">High → Low</option>
        <option value="asc">Low → High</option>
      </select>

      <label>
        Units:
        <select id="unitSelect">
          <option value="in">inches</option>
          <option value="mm">millimeters</option>
        </select>
      </label>

      <label>
        Search:
        <input id="search" type="search" placeholder="Station or STID" />
      </label>

      <span id="status" class="status">Loading…</span>
    </div>

    <table aria-describedby="status">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>

  <script>
    // === CONFIG: update to your actual JSON file name/path ===
    // If this HTML is at repo_root/precip/index.html and JSON is at repo_root/data/precip.json:
    const DATA_URL = "../data/precip.json";  // <-- change to your file name

    const INCH_TO_MM = 25.4;

    const state = {
      json: null,
      intervals: [],     // e.g., ["1","2","3","6","24","48"]
      unit: "in",
      sortInterval: "24",
      sortDir: "desc",
      search: ""
    };

    const el = (id) => document.getElementById(id);
    const thead = el("thead");
    const tbody = el("tbody");
    const errorBox = el("error");
    const statusText = el("status");
    const sortIntervalSel = el("sortInterval");
    const sortDirSel = el("sortDir");
    const unitSel = el("unitSelect");
    const searchInput = el("search");
    const generatedInfo = el("generatedInfo");

    function showError(message, detail) {
      errorBox.classList.remove("hidden");
      errorBox.textContent = message + (detail ? ` — ${detail}` : "");
      statusText.textContent = "Error";
    }
    function clearError() {
      errorBox.classList.add("hidden");
      errorBox.textContent = "";
    }

    function toNumber(x) {
      const n = Number(x);
      return Number.isFinite(n) ? n : null;
    }

    function convert(valInInches, unit) {
      if (valInInches === null || valInInches === undefined) return null;
      const v = Number(valInInches);
      if (!Number.isFinite(v)) return null;
      return unit === "mm" ? v * INCH_TO_MM : v;
    }

    function fmt(val, unit) {
      if (val === null || val === undefined || !Number.isFinite(Number(val))) return "—";
      const digits = unit === "mm" ? 1 : 2;
      return Number(val).toLocaleString(undefined, {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      });
    }

    function buildHeader() {
      thead.innerHTML = "";
      const tr = document.createElement("tr");
      const baseHeaders = ["Station", "STID", "Elevation (m)"];
      for (const h of baseHeaders) {
        const th = document.createElement("th");
        th.textContent = h;
        tr.appendChild(th);
      }
      for (const interval of state.intervals) {
        const th = document.createElement("th");
        th.className = "num";
        th.textContent = `${interval}h (${state.unit})`;
        tr.appendChild(th);
      }
      thead.appendChild(tr);
    }

    function getRows() {
      if (!state.json?.stations) return [];
      const intervals = state.intervals;
      return state.json.stations.map(s => {
        const precip = s.precip_in || {};
        const row = {
          station: s.name || "",
          stid: s.stid || "",
          elevation_m: toNumber(s.elevation_m),
          // Optional, if you ever want to use them:
          lat: toNumber(s.lat),
          lon: toNumber(s.lon),
          values: {}
        };
        for (const iv of intervals) {
          const raw = precip[iv] ?? null; // JSON keys are strings: "1","2",...
          row.values[iv] = raw;
        }
        return row;
      });
    }

    function applySearch(rows) {
      const q = state.search.trim().toLowerCase();
      if (!q) return rows;
      return rows.filter(r =>
        (r.station || "").toLowerCase().includes(q) ||
        (r.stid || "").toLowerCase().includes(q)
      );
    }

    function sortRows(rows) {
      const iv = state.sortInterval;
      const dir = state.sortDir;
      const sign = dir === "asc" ? 1 : -1;

      const byInterval = (a, b) => {
        const va = a.values?.[iv];
        const vb = b.values?.[iv];
        const na = Number.isFinite(Number(va)) ? Number(va) : -Infinity;
        const nb = Number.isFinite(Number(vb)) ? Number(vb) : -Infinity;
        if (na === nb) {
          // Tie-break by station name
          return a.station.localeCompare(b.station);
        }
        return (na - nb) * sign;
      };
      return [...rows].sort(byInterval);
    }

    function render() {
      buildHeader();
      const unit = state.unit;

      let rows = getRows();
      rows = applySearch(rows);
      rows = sortRows(rows);

      tbody.innerHTML = "";
      const frag = document.createDocumentFragment();
      for (const r of rows) {
        const tr = document.createElement("tr");

        const tdStation = document.createElement("td");
        tdStation.textContent = r.station;
        tr.appendChild(tdStation);

        const tdStid = document.createElement("td");
        tdStid.className = "muted";
        tdStid.textContent = r.stid;
        tr.appendChild(tdStid);

        const tdElev = document.createElement("td");
        tdElev.className = "num";
        tdElev.textContent = r.elevation_m != null ? r.elevation_m.toLocaleString() : "—";
        tr.appendChild(tdElev);

        for (const iv of state.intervals) {
          const td = document.createElement("td");
          td.className = "num";
          const converted = convert(r.values[iv], unit);
          td.textContent = fmt(converted, unit);
          tr.appendChild(td);
        }

        frag.appendChild(tr);
      }
      tbody.appendChild(frag);
      statusText.textContent = `${rows.length} stations • unit: ${unit} • sorted by ${state.sortInterval}h (${state.sortDir})`;
    }

    function populateControls() {
      // Interval selector for sorting
      sortIntervalSel.innerHTML = "";
      for (const iv of state.intervals) {
        const opt = document.createElement("option");
        opt.value = iv;
        opt.textContent = `${iv}h`;
        sortIntervalSel.appendChild(opt);
      }
      // Prefer 24h if available
      if (state.intervals.includes("24")) {
        sortIntervalSel.value = "24";
        state.sortInterval = "24";
      } else {
        sortIntervalSel.value = state.intervals[state.intervals.length - 1];
        state.sortInterval = sortIntervalSel.value;
      }
      sortDirSel.value = state.sortDir;
      unitSel.value = state.unit;
    }

    async function loadData() {
      statusText.textContent = "Loading…";
      clearError();
      try {
        const res = await fetch(DATA_URL, { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        const json = await res.json();
        state.json = json;

        // Convert intervals_hours to strings to match precip_in keys ("1","2",...)
        state.intervals = (json.intervals_hours || []).map(iv => String(iv));

        // Generated timestamps header
        const genLocal = json.generated_local || "—";
        const genUTC = json.generated_utc || "—";
        generatedInfo.textContent = `Generated: local ${genLocal} • UTC ${genUTC}`;

        populateControls();
        render();
      } catch (err) {
        showError("Failed to load JSON", err?.message);
      }
    }

    // === Wire up controls ===
    el("refresh").addEventListener("click", loadData);
    sortIntervalSel.addEventListener("change", (e) => {
      state.sortInterval = e.target.value;
      render();
    });
    sortDirSel.addEventListener("change", (e) => {
      state.sortDir = e.target.value;
      render();
    });
    unitSel.addEventListener("change", (e) => {
      state.unit = e.target.value;
      render();
    });
    searchInput.addEventListener("input", (e) => {
      state.search = e.target.value;
      render();
    });

    // Initial load
    loadData();
  </script>
</body>
</html>
