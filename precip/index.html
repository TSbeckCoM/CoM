<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Latest Precipitation — Maui & Molokaʻi</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0b0c10;
        --fg: #e6e6e6;
        --accent: #3aa0ff;
        --muted: #94a3b8;
        --error: #ff4d4f;
        --table-border: #334155;
        --row-alt: #0f172a;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue",
                     Ubuntu, "Noto Sans", sans-serif;
        background: var(--bg);
        color: var(--fg);
        line-height: 1.45;
      }
      header {
        padding: 1rem;
        border-bottom: 1px solid var(--table-border);
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
      header h1 {
        margin: 0;
        font-size: 1.25rem;
      }
      .meta {
        font-size: 0.95rem;
        color: var(--muted);
      }
      .spacer {
        flex: 1;
      }
      button {
        padding: 0.5rem 0.75rem;
        border-radius: 6px;
        border: 1px solid var(--table-border);
        background: transparent;
        color: var(--fg);
        cursor: pointer;
      }
      button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .status {
        margin: 0.5rem 1rem;
        font-size: 0.95rem;
        color: var(--muted);
        white-space: pre-wrap;
      }
      .status.error {
        color: var(--error);
      }
      .debug {
        margin: 0.5rem 1rem;
        font-size: 0.85rem;
        color: var(--muted);
        white-space: pre-wrap;
      }
      main {
        padding: 1rem;
        overflow-x: auto;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        min-width: 760px;
      }
      caption {
        text-align: left;
        padding: 0.25rem 0.75rem;
        color: var(--muted);
      }
      thead th {
        text-align: left;
        padding: 0.5rem 0.75rem;
        border-bottom: 2px solid var(--table-border);
        font-weight: 600;
        white-space: nowrap;
      }
      tbody td {
        padding: 0.5rem 0.75rem;
        border-bottom: 1px solid var(--table-border);
        vertical-align: top;
        white-space: nowrap;
      }
      tbody tr:nth-child(even) {
        background: var(--row-alt);
      }
      footer {
        padding: 1rem;
        border-top: 1px solid var(--table-border);
        color: var(--muted);
        font-size: 0.9rem;
      }
      code {
        background: #1f2937;
        padding: 0 0.25rem;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Latest Precip (pmode: <code>last</code>)</h1>
      <div class="meta">Last updated: <span id="last-updated">loading…</span></div>
      <div class="spacer"></div>
      <button id="refresh-btn" type="button">Refresh</button>
    </header>

    <div id="status" class="status" aria-live="polite">Loading data…</div>
    <div id="debug" class="debug"></div>

    <main>
      <table id="precip-table" aria-describedby="status">
        <caption>Values shown in inches (3 decimal places). Intervals: 1h, 2h, 3h, 6h, 24h, 48h.</caption>
        <thead>
          <tr>
            <th>STID</th><th>Name</th><th>Island</th>
            <th>1h</th><th>2h</th><th>3h</th><th>6h</th><th>24h</th><th>48h</th>
          </tr>
        </thead>
        <tbody id="precip-body"></tbody>
      </table>
    </main>
