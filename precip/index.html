<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Precipitation Readings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
      :root {
        --bg: #0f172a;      /* slate-900 */
        --panel: #111827;   /* gray-900 */
        --text: #e5e7eb;    /* gray-200 */
        --muted: #9ca3af;   /* gray-400 */
        --accent: #22d3ee;  /* cyan-400 */
        --border: #374151;  /* gray-700 */
        --header: #0b1220;
        --hover: #0d1a2b;
  
        /* NEW: sticky offset for the table header, set by JS to match header height */
        --sticky-offset: 0px;
      }
  
      * { box-sizing: border-box }
  
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
      }
  
      /* Keep page header sticky at the top */
      header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 10; /* ensure header sits above table header if they touch */
        backdrop-filter: saturate(180%) blur(6px);
              background: color-mix(in oklab, var(--bg) 85%, transparent);
            }
      header h1 { margin: 0 0 .25rem 0; font-size: 1.25rem }
      header .sub { color: var(--muted); font-size: .95rem }
  
      main { max-width: 1100px; margin: 1rem auto; padding: 0 1rem 2rem }
  
      .controls {
        display: flex;
        gap: .5rem;
        flex-wrap: wrap;
        align-items: center;
        margin-bottom: .75rem;
      }
      .controls button, .controls select, .controls input[type="search"] {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        padding: .5rem .75rem;
        border-radius: .5rem;
        cursor: pointer;
      }
      .controls button:hover { border-color: var(--accent); color: white }
      .status { color: var(--muted); font-size: .9rem; margin-left: auto }
  
      .error {
        border: 1px solid #ef4444;
        color: white;
        background: color-mix(in oklab, #ef4444 20%, transparent);
        padding: .75rem;
        border-radius: .5rem;
        margin: .75rem 0 1rem;
      }
      .hidden { display: none }
        
      /* WRAPPER: does the rounding/clipping so the table itself isn't clipped */
      .table-wrap {
        border: 1px solid var(--border);
        border-radius: .5rem;
        overflow: hidden;       /* clip the table content inside this wrapper */
        background: var(--panel);
      }
  
      table {
        width: 100%;
        border-collapse: collapse;
        /* no border, no overflow here; sticky header works better this way */
      }
  
      /* Make table header sticky, with offset equal to page header height *            
      thead th {
        position: sticky;
        top: var(--sticky-offset);
        z-index: 5; /* below page header, above body rows */
        text-align: left;
        padding: .6rem .75rem;
        background: var(--header); /* solid background to avoid visual bleed */
        border-bottom: 1px solid var(--border);
        font-weight: 600;
        white-space: nowrap;
      }
  
      tbody td {
        padding: .6rem .75rem;
        border-bottom: 1px solid var(--border);
        vertical-align: top;
        background: transparent; /* default row background */
      }
      tbody tr:hover { background: var(--hover) }
  
      .num { text-align: right; font-variant-numeric: tabular-nums }
      .muted { color: var(--muted) }
    </style>
</head>
<body>
  <header>
    <h1>Precipitation Readings</h1>
    <div class="sub" id="generatedInfo">Generated: —</div>
  </header>
  
  <main>
    <div id="error" class="error hidden" role="alert"></div>

    <div class="controls">
      <button id="refresh">Refresh</button>

      <label>Sort by: <select id="sortInterval"></select></label>
      <select id="sortDir"><option value="desc">High → Low</option><option value="asc">Low → High</option></select>

      <label>Units: <select id="unitSelect"><option value="in">inches</option><option value="mm">millimeters</option></select></label>

      <label>Search: <input id="search" type="search" placeholder="Station or STID" /></label>

      <span id="status" class="status">Loading…</span>
    </div>

    <table aria-describedby="status">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
  <script>
    // Measure the page header and set the sticky offset for the table header
    function setStickyOffset() {
      const headerEl = document.querySelector("header");
      const h = headerEl ? headerEl.getBoundingClientRect().height : 0;
      document.documentElement.style.setProperty("--sticky-offset", `${Math.round(h)}px`);
    }
    window.addEventListener("load", setStickyOffset);
    window.addEventListener("resize", setStickyOffset);
  </script>
  <script>
    // JSON path relative to /precip/index.html
    const DATA_URL = "../data/latestPrecip.json";
    const INCH_TO_MM = 25.4;

    const state = { json: null, intervals: [], unit: "in", sortInterval: "24", sortDir: "desc", search: "" };

    const el = (id) => document.getElementById(id);
    const thead = el("thead"), tbody = el("tbody"), errorBox = el("error"), statusText = el("status");
    const sortIntervalSel = el("sortInterval"), sortDirSel = el("sortDir"), unitSel = el("unitSelect"), searchInput = el("search"), generatedInfo = el("generatedInfo");

    function showError(message, detail) { errorBox.classList.remove("hidden"); errorBox.textContent = message + (detail ? ` — ${detail}` : ""); statusText.textContent = "Error"; }
    function clearError() { errorBox.classList.add("hidden"); errorBox.textContent = ""; }
    function toNumber(x) { const n = Number(x); return Number.isFinite(n) ? n : null; }
    function convert(valInInches, unit) { if (valInInches == null) return null; const v = Number(valInInches); return Number.isFinite(v) ? (unit === "mm" ? v * INCH_TO_MM : v) : null; }
    function fmt(val, unit) { if (val == null || !Number.isFinite(Number(val))) return "—"; const digits = unit === "mm" ? 1 : 2; return Number(val).toLocaleString(undefined, { minimumFractionDigits: digits, maximumFractionDigits: digits }); }

    function buildHeader() {
      thead.innerHTML = "";
      const tr = document.createElement("tr");
      for (const h of ["Station", "STID", "Elevation (m)"]) { const th = document.createElement("th"); th.textContent = h; tr.appendChild(th); }
      for (const interval of state.intervals) { const th = document.createElement("th"); th.className = "num"; th.textContent = `${interval}h (${state.unit})`; tr.appendChild(th); }
      thead.appendChild(tr);
    }

    function getRows() {
      if (!state.json?.stations) return [];
      const intervals = state.intervals;
      return state.json.stations.map(s => {
        const precip = s.precip_in || {};
        const row = {
          station: s.display_name || s.name || "", // <- use display_name
          island: s.island || "",
          stid: s.stid || "",
          elevation_m: toNumber(s.elevation_m),
          lat: toNumber(s.lat),
          lon: toNumber(s.lon),
          values: {}
        };
        for (const iv of intervals) { row.values[iv] = precip[iv] ?? null; }
        return row;
      });
    }
    
    function applySearch(rows) {
      const q = state.search.trim().toLowerCase(); if (!q) return rows;
      return rows.filter(r => (r.station || "").toLowerCase().includes(q) || (r.stid || "").toLowerCase().includes(q));
    }

    function sortRows(rows) {
      const iv = state.sortInterval, dir = state.sortDir, sign = dir === "asc" ? 1 : -1;
      const byInterval = (a, b) => {
        const na = Number.isFinite(Number(a.values?.[iv])) ? Number(a.values[iv]) : -Infinity;
        const nb = Number.isFinite(Number(b.values?.[iv])) ? Number(b.values[iv]) : -Infinity;
        return na === nb ? a.station.localeCompare(b.station) : (na - nb) * sign;
      };
      return [...rows].sort(byInterval);
    }

    function render() {
      buildHeader();
      const unit = state.unit;
      let rows = sortRows(applySearch(getRows()));

      tbody.innerHTML = "";
      const frag = document.createDocumentFragment();
      for (const r of rows) {
        const tr = document.createElement("tr");
        const tdStation = document.createElement("td"); tdStation.textContent = r.station; tr.appendChild(tdStation);
        const tdStid = document.createElement("td"); tdStid.className = "muted"; tdStid.textContent = r.stid; tr.appendChild(tdStid);
        const tdElev = document.createElement("td"); tdElev.className = "num"; tdElev.textContent = r.elevation_m != null ? r.elevation_m.toLocaleString() : "—"; tr.appendChild(tdElev);
        for (const iv of state.intervals) { const td = document.createElement("td"); td.className = "num"; td.textContent = fmt(convert(r.values[iv], unit), unit); tr.appendChild(td); }
        frag.appendChild(tr);
      }
      tbody.appendChild(frag);
      statusText.textContent = `${rows.length} stations • unit: ${unit} • sorted by ${state.sortInterval}h (${state.sortDir})`;
    }

    function populateControls() {
      sortIntervalSel.innerHTML = "";
      for (const iv of state.intervals) { const opt = document.createElement("option"); opt.value = iv; opt.textContent = `${iv}h`; sortIntervalSel.appendChild(opt); }
      sortIntervalSel.value = state.intervals.includes("24") ? "24" : state.intervals[state.intervals.length - 1];
      state.sortInterval = sortIntervalSel.value;
      unitSel.value = state.unit; sortDirSel.value = state.sortDir;
    }

    async function loadData() {
      statusText.textContent = "Loading…"; clearError();
      try {
        const res = await fetch(DATA_URL, { cache: "no-cache" });
        if (!res.ok) throw new Error(`HTTP ${res.status} — ${res.statusText}`);
        const json = await res.json();
        state.json = json;
        state.intervals = (json.intervals_hours || []).map(iv => String(iv));
        generatedInfo.textContent = `Generated: local ${json.generated_local ?? "—"} • UTC ${json.generated_utc ?? "—"}`;
        populateControls(); render();
      } catch (err) { showError("Failed to load JSON", err?.message); }
    }

    el("refresh").addEventListener("click", loadData);
    sortIntervalSel.addEventListener("change", (e) => { state.sortInterval = e.target.value; render(); });
    sortDirSel.addEventListener("change", (e) => { state.sortDir = e.target.value; render(); });
    unitSel.addEventListener("change", (e) => { state.unit = e.target.value; render(); });
    el("search").addEventListener("input", (e) => { state.search = e.target.value; render(); });

    loadData();
  </script>
</body>
</html>
