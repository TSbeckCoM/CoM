<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Precipitation Readings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    /* colors */
    --bg: #0f172a;      /* slate-900 */
    --panel: #111827;   /* gray-900 */
    --text: #e5e7eb;    /* gray-200 */
    --muted: #9ca3af;   /* gray-400 */
    --accent: #22d3ee;  /* cyan-400 */
    --border: #374151;  /* gray-700 */
    --header: #0b1220;
    --hover: #0d1a2b;

    /* sticky offset set by JS */
    --sticky-offset: 0px;

    /* spacing scale */
    --space-0: 0;
    --space-1: 0.25rem;
    --space-2: 0.5rem;
    --space-3: 0.75rem;
    --space-4: 1rem;
    --space-5: 1.25rem;
    --space-6: 1.5rem;

    /* page-level spacing */
    --main-pad-x: var(--space-4);
    --main-pad-y: var(--space-6);

    /* controls spacing */
    --controls-gap: var(--space-3);
    --control-pad-x: var(--space-3);
    --control-pad-y: 0.55rem;

    /* table spacing */
    --table-margin-top: var(--space-3);
    --th-pad-x: var(--space-4);
    --th-pad-y: var(--space-3);
    --td-pad-x: var(--space-4);
    --td-pad-y: var(--space-3);
    --row-line-height: 1.6; /* more breathing room */
  }

  * { box-sizing: border-box }

  body {
    font-family: system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }

  /* Sticky page header */
  header {
    padding: var(--space-4) var(--space-5);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: saturate(180%) blur(6px);
    background: color-mix(in oklab, var(--bg) 85%, transparent);
  }
  header h1 { margin: 0 0 var(--space-2) 0; font-size: 1.35rem }
  header .sub { color: var(--muted); font-size: .95rem }

  main {
    max-width: 1100px;
    margin: var(--space-4) auto;
    padding: var(--main-pad-y) var(--main-pad-x) var(--space-6);
  }

  .controls {
    display: flex;
    gap: var(--controls-gap);
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: var(--space-3);
  }
  .controls button, .controls select, .controls input[type="search"] {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: var(--control-pad-y) var(--control-pad-x);
    border-radius: .6rem;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--accent); color: white }
  .status { color: var(--muted); font-size: .95rem; margin-left: auto }

  .error {
    border: 1px solid #ef4444;
    color: white;
    background: color-mix(in oklab, #ef4444 20%, transparent);
    padding: var(--space-3);
    border-radius: .6rem;
    margin: var(--space-3) 0 var(--space-4);
  }
  .hidden { display: none }

  /* Wrapper: rounded corners & clipping */
  .table-wrap {
    margin-top: var(--table-margin-top);
    border: 1px solid var(--border);
    border-radius: .75rem;
    overflow: hidden;
    background: var(--panel);
  }

  table {
    width: 100%;
    border-collapse: collapse; /* better for sticky header */
  }

  /* Sticky table header with offset under page header */
  thead th {
    position: sticky;
    top: var(--sticky-offset);
    z-index: 5;
    text-align: left;
    padding: var(--th-pad-y) var(--th-pad-x);
    background: var(--header);
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    white-space: nowrap;
  }

  tbody td {
    padding: var(--td-pad-y) var(--td-pad-x);
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: var(--row-line-height);
  }
  tbody tr:hover { background: var(--hover) }

  .num { text-align: right; font-variant-numeric: tabular-nums }
  .muted { color: var(--muted) }

  /* Optional: tighter on very small screens */
  @media (max-width: 520px) {
    :root {
      --th-pad-x: var(--space-3);
      --td-pad-x: var(--space-3);
      --row-line-height: 1.5;
    }
    header { padding: var(--space-3) var(--space-4); }
    header h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>
  <header>
    <h1>Precipitation Readings</h1>
    <div class="sub" id="generatedInfo">Generated: —</div>
  </header>
  
  <main>
    <div id="error" class="error hidden" role="alert"></div>

    <div class="controls">
      <button id="refresh">Refresh</button>

      <label>Sort by: <select id="sortInterval"></select></label>
      <select id="sortDir"><option value="desc">High → Low</option><option value="asc">Low → High</option></select>

      <label>Units: <select id="unitSelect"><option value="in">inches</option><option value="mm">millimeters</option></select></label>

      <label>Search: <input id="search" type="search" placeholder="Station or STID" /></label>

      <span id="status" class="status">Loading…</span>
    </div>

    <table aria-describedby="status">
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </main>
  <script>
    // Measure the page header and set the sticky offset for the table header
    function setStickyOffset() {
      const headerEl = document.querySelector("header");
      const h = headerEl ? headerEl.getBoundingClientRect().height : 0;
      document.documentElement.style.setProperty("--sticky-offset", `${Math.round(h)}px`);
    }
    window.addEventListener("load", setStickyOffset);
    window.addEventListener("resize", setStickyOffset);
  </script>
