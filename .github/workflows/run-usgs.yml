name: Run USGS Script

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:         # manual trigger

jobs:
  run-script:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run PowerShell script
        shell: pwsh
        run: |
          ./StreamGageUpdate.ps1

      - name: Commit latest.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest.json
          
          git commit -m "Update latest.json" || echo "No changes to commit"
          git push

      - name: Email latest.json
        shell: pwsh
        run: |
          $smtpServer = "${{ secrets.SMTP_SERVER }}"
          $smtpPort   = "${{ secrets.SMTP_PORT }}"
          $username   = "${{ secrets.SMTP_USERNAME }}"
          $password   = "${{ secrets.SMTP_PASSWORD }}"
          $to         = "${{ secrets.EMAIL_TO }}"
      
          $secure = ConvertTo-SecureString $password -AsPlainText -Force
          $creds  = New-Object System.Management.Automation.PSCredential ($username, $secure)
      
          $jsonBody = Get-Content "./latest.json" -Raw
      
          Send-MailMessage `
            -From $username `
            -To $to `
            -Subject "USGS Update" `
            -Body $jsonBody `
            -Attachments "./latest.json" `
            -SmtpServer $smtpServer `
            -Port $smtpPort `
            -UseSsl `
            -Credential $creds
