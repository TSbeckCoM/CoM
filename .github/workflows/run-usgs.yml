name: Update Dashboard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run USGS script
        shell: pwsh
        run: ./StreamGageUpdate.ps1

      # ---------------------------------------
      # NEW STEP: Compute 2-hour moving-average trend
      # ---------------------------------------
      - name: Compute Trend
        shell: pwsh
        run: ./compute-trend.ps1

      - name: Write build timestamp
        shell: pwsh
        run: |
          $ts = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $json = @{ buildTime = $ts } | ConvertTo-Json
          Set-Content -Path buildinfo.json -Value $json -Encoding UTF8

      - name: Commit dashboard files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest.json latest_with_trend.json history.json buildinfo.json
          git commit -m "Update dashboard" || echo "No changes"
          git push
