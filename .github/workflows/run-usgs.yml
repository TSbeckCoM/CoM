name: Update Dashboard

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Run USGS script
        shell: pwsh
        run: ./StreamGageUpdate.ps1
      
      - name: Write build timestamp
        run: |
          echo "{ \"buildTime\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\" }" > buildinfo.json

      - name: Commit dashboard files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest.json buildinfo.json
          git commit -m "Update dashboard" || echo "No changes"
          git push
