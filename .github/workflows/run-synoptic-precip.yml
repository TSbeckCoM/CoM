name: Fetch latest precip

on:
  schedule:
    - cron: "*/15 * * * *"       # every 30 minutes (adjust as needed)
  workflow_dispatch:

concurrency:
  group: "update-precip-json"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests python-dateutil

      - name: Fetch precip
        env:
          SYNOPTIC_TOKEN: ${{ secrets.SYNOPTIC_TOKEN }}
          OUTPUT_JSON: data/latestPrecip.json
        run: python ./fetch_precip.py

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config pull.rebase true
          git config rebase.autoStash true

      - name: Stage changes (only if modified)
        run: |
          # Stage your target(s)
          git add data/latestPrecip.json || true
          git add latestPrecip.json || true

          echo "----- git status -----"
          git status --porcelain || true
          echo "----------------------"

      - name: Commit if staged (set COMMITTED flag)
        run: |
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            echo "COMMITTED=false" >> "$GITHUB_ENV"
          else
            git commit -m "Update latest precip JSON [skip ci]"
            echo "Committed changes."
            echo "COMMITTED=true" >> "$GITHUB_ENV"
          fi

      - name: Pull with rebase to integrate remote changes
        run: |
          if [ "${COMMITTED}" = "true" ]; then
            # Integrate remote updates to avoid 'fetch first'
            git pull --rebase origin main || { git rebase --abort; exit 1; }
          else
            echo "No local commit created; skipping pull --rebase."
          fi

      - name: Push
        run: |
          if [ "${COMMITTED}" = "true" ]; then
            # Normal push (preferred)
            git push origin HEAD:main || {
              echo "Normal push failed; attempting force-with-lease."
              git push --force-with-lease origin HEAD:main
            }
          else
            echo "No new commit; nothing to push."
          fi

